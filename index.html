<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>СФУ Расписание</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --accent: #2563EB; --bg: #F0F2F5; --surface: #FFFFFF; --text: #0F1117; --text2: #5C6370; --border: rgba(0,0,0,0.08); }
@media (prefers-color-scheme: dark) { :root { --bg: #0D0F14; --surface: #161921; --text: #F0F2F5; --text2: #8B95A6; --border: rgba(255,255,255,0.08); } }
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
body { background: var(--bg); color: var(--text); padding-bottom: 20px; }
.header { position: sticky; top: 0; z-index: 10; background: var(--surface); padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.header-title { font-weight: 700; font-size: 18px; }
.btn-icon { background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px; color: var(--text); }
#searchScreen, #scheduleScreen { padding: 16px; }
.search-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 16px; outline: none; margin-bottom: 16px; }
.groups-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.group-card { background: var(--surface); padding: 12px; border-radius: 12px; text-align: center; font-weight: 600; border: 1px solid var(--border); }
.day-tabs { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 16px; padding-bottom: 4px; scrollbar-width: none; }
.day-tab { padding: 8px 16px; background: var(--surface); border-radius: 20px; font-size: 13px; font-weight: 600; white-space: nowrap; border: 1px solid var(--border); }
.day-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
.lesson-card { background: var(--surface); border-radius: 12px; padding: 14px; margin-bottom: 10px; border-left: 4px solid var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
.lesson-time { font-size: 12px; color: var(--text2); font-weight: 700; }
.lesson-name { font-size: 14px; font-weight: 600; margin: 4px 0; }
.lesson-meta { font-size: 12px; color: var(--text2); }
.fav-btn { color: #EAB308; }
.loader { text-align: center; padding: 40px; color: var(--text2); }
</style>
</head>
<body>

<div class="header">
  <button class="btn-icon" id="backBtn" onclick="goBack()" style="visibility:hidden">⬅️</button>
  <div class="header-title" id="title">СФУ Расписание</div>
  <button class="btn-icon fav-btn" id="favBtn" onclick="toggleFavorite()">☆</button>
</div>

<div id="searchScreen">
  <input type="text" class="search-input" id="searchInput" placeholder="Поиск (например: КИ24)..." oninput="handleSearch()">
  <div class="groups-grid" id="groupsGrid"></div>
</div>

<div id="scheduleScreen" style="display:none">
  <div class="day-tabs" id="dayTabs"></div>
  <div id="lessons"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
const TIME_GRID = {1:'08:30-10:05', 2:'10:15-11:50', 3:'12:00-13:35', 4:'14:10-15:45', 5:'15:55-17:30', 6:'17:40-19:15', 7:'19:25-21:00'};
const DAYS = ['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];

let allGroups = [];
let currentGroup = null;
let scheduleData = {};

async function init() {
  tg.expand();
  const fav = localStorage.getItem('sfu_fav');
  
  const res = await fetch('https://edu.sfu-kras.ru/api/timetable/groups');
  const data = await res.json();
  allGroups = [...new Set(data.map(i => i.name))].sort();
  
  if (fav) {
    openGroup(fav);
  } else {
    renderGroups(allGroups.slice(0, 20));
  }
}

function renderGroups(list) {
  const grid = document.getElementById('groupsGrid');
  grid.innerHTML = list.map(g => `<div class="group-card" onclick="openGroup('${g}')">${g}</div>`).join('');
}

function handleSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allGroups.filter(g => g.toLowerCase().includes(q)).slice(0, 30);
  renderGroups(filtered);
}

async function openGroup(name) {
  currentGroup = name;
  document.getElementById('searchScreen').style.display = 'none';
  document.getElementById('scheduleScreen').style.display = 'block';
  document.getElementById('backBtn').style.visibility = 'visible';
  document.getElementById('title').textContent = name;
  updateFavIcon();

  document.getElementById('lessons').innerHTML = '<div class="loader">Загрузка...</div>';
  const res = await fetch(`https://edu.sfu-kras.ru/api/timetable/lessons?group=${encodeURIComponent(name)}`);
  const data = await res.json();
  
  scheduleData = {};
  data.lessons.forEach(l => {
    const d = DAYS[l.day-1];
    if(!scheduleData[d]) scheduleData[d] = [];
    scheduleData[d].push(l);
  });

  renderTabs();
  const today = DAYS[new Date().getDay()-1] || DAYS[0];
  showDay(scheduleData[today] ? today : Object.keys(scheduleData)[0]);
}

function renderTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = Object.keys(scheduleData).map(d => `<div class="day-tab" id="tab-${d}" onclick="showDay('${d}')">${d.slice(0,2)}</div>`).join('');
}

function showDay(day) {
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  if(document.getElementById(`tab-${day}`)) document.getElementById(`tab-${day}`).classList.add('active');

  const lessons = scheduleData[day] || [];
  document.getElementById('lessons').innerHTML = lessons.sort((a,b)=>a.pair-b.pair).map(l => `
    <div class="lesson-card">
      <div class="lesson-time">${TIME_GRID[l.pair] || 'Пара '+l.pair}</div>
      <div class="lesson-name">${l.subject}</div>
      <div class="lesson-meta">${l.type} | ${l.place || '---'}</div>
      <div class="lesson-meta">${l.week==1?'[нечет]':l.week==2?'[чет]':''}</div>
    </div>
  `).join('');
}

function toggleFavorite() {
  if(!currentGroup) return;
  const fav = localStorage.getItem('sfu_fav');
  if(fav === currentGroup) {
    localStorage.removeItem('sfu_fav');
  } else {
    localStorage.setItem('sfu_fav', currentGroup);
  }
  updateFavIcon();
}

function updateFavIcon() {
  const fav = localStorage.getItem('sfu_fav');
  document.getElementById('favBtn').textContent = (fav === currentGroup) ? '⭐' : '☆';
}

function goBack() {
  document.getElementById('searchScreen').style.display = 'block';
  document.getElementById('scheduleScreen').style.display = 'none';
  document.getElementById('backBtn').style.visibility = 'hidden';
  document.getElementById('title').textContent = 'СФУ Расписание';
  currentGroup = null;
  renderGroups(allGroups.slice(0, 20));
  updateFavIcon();
}

init();
</script>
</body>
</html>
