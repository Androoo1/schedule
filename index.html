<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>СФУ Расписание</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #2563EB;
  --accent-soft: rgba(37,99,235,0.1);
  --accent-glow: rgba(37,99,235,0.18);
  --bg: #F0F2F5;
  --surface: #FFFFFF;
  --surface2: #F7F8FA;
  --text: #0F1117;
  --text2: #5C6370;
  --text3: #9BA3AF;
  --border: rgba(0,0,0,0.07);
  --green: #16A34A;
  --green-soft: rgba(22,163,74,0.1);
  --orange: #EA580C;
  --orange-soft: rgba(234,88,12,0.1);
  --red: #DC2626;
  --red-soft: rgba(220,38,38,0.1);
  --radius: 16px;
  --radius-sm: 10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0D0F14;
    --surface: #161921;
    --surface2: #1E2230;
    --text: #F0F2F5;
    --text2: #8B95A6;
    --text3: #4D5566;
    --border: rgba(255,255,255,0.07);
    --accent-soft: rgba(59,130,246,0.12);
    --accent-glow: rgba(59,130,246,0.2);
    --green-soft: rgba(34,197,94,0.1);
    --orange-soft: rgba(251,146,60,0.1);
    --red-soft: rgba(248,113,113,0.1);
  }
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── HEADER ─── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 14px) 16px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-logo {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.header-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }

.header-back {
  margin-left: auto;
  background: var(--surface2);
  border: none;
  border-radius: 8px;
  padding: 7px 13px;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  cursor: pointer;
  display: none;
  align-items: center;
  gap: 5px;
}
.header-back.visible { display: flex; }

/* ─── SEARCH SCREEN ─── */
#searchScreen { padding: 16px; }

.search-wrap {
  position: relative;
  margin-bottom: 20px;
}
.search-icon {
  position: absolute;
  left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 16px; opacity: 0.4; pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 13px 14px 13px 40px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-size: 15px;
  font-family: inherit;
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-input::placeholder { color: var(--text3); }

/* ─── SECTION LABEL ─── */
.section-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 10px;
  padding: 0 2px;
}

/* ─── GROUPS GRID ─── */
.groups-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 8px;
  margin-bottom: 24px;
}

.group-chip {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 8px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all .15s ease;
  user-select: none;
}
.group-chip:active {
  transform: scale(0.95);
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}

/* ─── DAY TABS ─── */
.day-tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 2px;
  margin-bottom: 16px;
  scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }

.day-tab {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  background: var(--surface);
  color: var(--text2);
  transition: all .15s;
  white-space: nowrap;
}
.day-tab.active {
  background: var(--accent);
  color: #fff;
}
.day-tab.today { color: var(--accent); }
.day-tab.today.active { color: #fff; }

/* ─── SCHEDULE SCREEN ─── */
#scheduleScreen { padding: 16px; display: none; }

.group-hero {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.group-avatar {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.group-name { font-size: 18px; font-weight: 700; }
.group-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* ─── LESSON CARDS ─── */
.lessons-list { display: flex; flex-direction: column; gap: 10px; }

.lesson-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  transition: transform .15s;
  position: relative;
  overflow: hidden;
}
.lesson-card:active { transform: scale(0.98); }

.lesson-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 3px 0 0 3px;
}
.lesson-card.ongoing::before { background: var(--green); }
.lesson-card.upcoming::before { background: var(--orange); }
.lesson-card.past { opacity: 0.55; }
.lesson-card.past::before { background: var(--text3); }

.lesson-time-col {
  min-width: 60px;
  flex-shrink: 0;
}
.lesson-time-start {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.lesson-time-end {
  font-size: 11px;
  color: var(--text3);
  margin-top: 3px;
}

.lesson-body { flex: 1; min-width: 0; }
.lesson-name {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.35;
  margin-bottom: 6px;
}
.lesson-info {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.lesson-tag {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 6px;
  background: var(--surface2);
  color: var(--text2);
  white-space: nowrap;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ─── STATUS BADGE ─── */
.status-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  white-space: nowrap;
  align-self: flex-start;
  flex-shrink: 0;
}
.badge-ongoing { background: var(--green-soft); color: var(--green); }
.badge-upcoming { background: var(--orange-soft); color: var(--orange); }
.badge-soon { background: var(--accent-soft); color: var(--accent); }

/* ─── EMPTY / LOADER ─── */
.empty-day {
  text-align: center;
  padding: 40px 20px;
  color: var(--text2);
}
.empty-day-icon { font-size: 40px; margin-bottom: 10px; }
.empty-day-text { font-size: 15px; font-weight: 500; }
.empty-day-sub { font-size: 13px; color: var(--text3); margin-top: 4px; }

.loader-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 50px 20px;
  gap: 14px;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 14px; color: var(--text2); }

/* ─── ERROR ─── */
.error-card {
  background: var(--red-soft);
  border: 1px solid rgba(220,38,38,0.2);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  margin-bottom: 16px;
}
.error-icon { font-size: 20px; flex-shrink: 0; }
.error-text { font-size: 13px; color: var(--red); font-weight: 500; }

/* ─── NO RESULTS ─── */
.no-results {
  text-align: center;
  padding: 30px;
  color: var(--text3);
  font-size: 14px;
}

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 16px);
  left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--text);
  color: var(--surface);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 18px;
  border-radius: 20px;
  transition: transform .3s ease;
  z-index: 999;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity:0; transform: translateY(12px); }
  to { opacity:1; transform: translateY(0); }
}
.fade-up { animation: fadeUp .25s ease forwards; }
</style>
</head>
<body>

<div class="header" id="header">
  <div class="header-logo">📚</div>
  <div>
    <div class="header-title" id="headerTitle">СФУ Расписание</div>
    <div class="header-sub" id="headerSub" style="color:var(--text2)"></div>
  </div>
  <button class="header-back" id="backBtn" onclick="goBack()">← Назад</button>
</div>

<div id="searchScreen">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput"
      placeholder="Введите группу: КИ25..."
      autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <div class="section-label" id="groupsLabel">Все группы</div>
  <div class="groups-grid" id="groupsGrid"></div>
</div>

<div id="scheduleScreen">
  <div class="group-hero" id="groupHero">
    <div class="group-avatar">🎓</div>
    <div>
      <div class="group-name" id="heroName"></div>
      <div class="group-meta" id="heroMeta"></div>
    </div>
  </div>

  <div class="day-tabs" id="dayTabs"></div>
  <div class="lessons-list" id="lessonsContainer"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

// Применяем тему Telegram
if (tg.themeParams) {
  const tp = tg.themeParams;
  if (tp.bg_color) document.documentElement.style.setProperty('--bg', hexToRgba(tp.bg_color));
  if (tp.secondary_bg_color) document.documentElement.style.setProperty('--surface', hexToRgba(tp.secondary_bg_color));
  if (tp.text_color) document.documentElement.style.setProperty('--text', hexToRgba(tp.text_color));
  if (tp.hint_color) document.documentElement.style.setProperty('--text2', hexToRgba(tp.hint_color));
  if (tp.button_color) document.documentElement.style.setProperty('--accent', hexToRgba(tp.button_color));
}

function hexToRgba(hex) {
  if (!hex || !hex.startsWith('#')) return hex;
  return hex;
}

// ─── ДАННЫЕ ───
let allGroups = [];
let currentGroup = null;
let currentSchedule = {};
let currentDay = null;

const DAYS = ['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
const DAYS_SHORT = ['Пн','Вт','Ср','Чт','Пт','Сб'];

// Точное расписание звонков СФУ
const TIME_MAP = {
  1: { start: '08:30', end: '10:05' },
  2: { start: '10:15', end: '11:50' },
  3: { start: '12:00', end: '13:35' },
  4: { start: '14:10', end: '15:45' },
  5: { start: '15:55', end: '17:30' },
  6: { start: '17:40', end: '19:15' },
  7: { start: '19:25', end: '21:00' }
};

// Индекс сегодняшнего дня (0=пн)
function getTodayIdx() {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1; // Воскресенье -> 6
}

function getCurrentTime() {
  const now = new Date();
  return now.getHours() * 60 + now.getMinutes();
}

function parseTime(str) {
  const m = str.match(/(\d{1,2}):(\d{2})/g);
  if (!m || m.length < 1) return null;
  const [h, min] = m[0].split(':').map(Number);
  return h * 60 + min;
}

function parseEndTime(str) {
  const m = str.match(/(\d{1,2}):(\d{2})/g);
  if (!m || m.length < 2) return null;
  const [h, min] = m[1].split(':').map(Number);
  return h * 60 + min;
}

function getLessonStatus(timeStr) {
  const now = getCurrentTime();
  const start = parseTime(timeStr);
  const end = parseEndTime(timeStr);
  if (start === null || end === null) return 'unknown';
  if (now >= start && now <= end) return 'ongoing';
  if (now < start) {
    if (start - now <= 15) return 'soon';
    return 'upcoming';
  }
  return 'past';
}

function formatCountdown(timeStr) {
  const now = getCurrentTime();
  const start = parseTime(timeStr);
  const end = parseEndTime(timeStr);
  if (start === null || end === null) return '';

  if (now >= start && now <= end) {
    const left = end - now;
    if (left < 1) return 'Заканчивается';
    if (left < 60) return `Ещё ${left} мин`;
    return `Ещё ${Math.floor(left/60)}ч ${left%60}мин`;
  }
  if (now < start) {
    const left = start - now;
    if (left <= 15) return `Через ${left} мин`;
    return '';
  }
  return '';
}

// ─── ИНИЦИАЛИЗАЦИЯ ───
async function init() {
  const now = new Date();
  document.getElementById('headerSub').textContent = now.toLocaleDateString('ru', {
    day: 'numeric', month: 'long', weekday: 'short'
  });

  showLoader();
  allGroups = await fetchGroups();
  hideLoader();
  renderGroups(allGroups); // Рендерит с ограничением, чтобы не лагало
}

function showLoader() {
  document.getElementById('groupsGrid').innerHTML = `
    <div style="grid-column:1/-1">
      <div class="loader-wrap">
        <div class="spinner"></div>
        <div class="loader-text">Загружаю список групп...</div>
      </div>
    </div>`;
}

function hideLoader() {}

// ─── ПРЯМОЙ ЗАПРОС К JSON API СФУ ───
async function safeFetch(targetUrl) {
    // Сначала пробуем запросить напрямую
    try {
        const res = await fetch(targetUrl, { signal: AbortSignal.timeout(5000) });
        if (res.ok) return await res.json();
    } catch (e) {
        console.warn("Direct fetch failed (likely CORS), switching to proxy...");
    }
    
    // Если словили CORS, используем прокси
    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);
    const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
}

async function fetchGroups() {
  try {
    const data = await safeFetch('https://edu.sfu-kras.ru/api/timetable/groups');
    const groups = new Set();
    data.forEach(item => {
        if (item && item.name) groups.add(item.name);
    });
    
    const arr = [...groups].sort();
    return arr.length > 0 ? arr : getTestGroups();
  } catch(e) {
    console.error('API groups fetch failed:', e);
    return getTestGroups(); // Возвращаем мок если сервер совсем упал
  }
}

async function fetchSchedule(group) {
  try {
    const targetUrl = `https://edu.sfu-kras.ru/api/timetable/lessons?group=${encodeURIComponent(group)}`;
    const data = await safeFetch(targetUrl);
    return parseScheduleFromJSON(data);
  } catch(e) {
    console.error('Schedule fetch failed:', e);
    return {};
  }
}

function parseScheduleFromJSON(data) {
  const schedule = {};
  const daysMap = {1: 'Понедельник', 2: 'Вторник', 3: 'Среда', 4: 'Четверг', 5: 'Пятница', 6: 'Суббота'};

  if (!data || !data.lessons) return {};

  data.lessons.forEach(lesson => {
    const dayName = daysMap[lesson.day];
    if (!dayName) return;
    if (!schedule[dayName]) schedule[dayName] = [];

    const pair = lesson.pair || 1;
    const times = TIME_MAP[pair] || {start: `${pair} пара`, end: ''};
    const timeStr = `${times.start}–${times.end}`;

    // Обработка недель
    let weekStr = '';
    if (lesson.week === 1) weekStr = ' [нечет]';
    else if (lesson.week === 2) weekStr = ' [чет]';

    const typeStr = lesson.type ? ` (${lesson.type})` : '';

    schedule[dayName].push({
      time: timeStr,
      name: (lesson.subject || 'Без названия') + typeStr + weekStr,
      teacher: lesson.teacher || '—',
      room: lesson.place || '—',
      endTime: times.end,
      pairNum: pair,
      week: lesson.week || 0
    });
  });

  // Сортируем пары по времени
  Object.keys(schedule).forEach(day => {
    schedule[day].sort((a, b) => {
      if (a.pairNum !== b.pairNum) return a.pairNum - b.pairNum;
      return a.week - b.week;
    });
  });

  return schedule;
}

// ─── RENDER GROUPS (Оптимизировано от лагов) ───
function renderGroups(groups) {
  const grid = document.getElementById('groupsGrid');
  const label = document.getElementById('groupsLabel');

  if (!groups.length) {
    grid.innerHTML = '<div class="no-results">Группы не найдены</div>';
    return;
  }

  // Ограничиваем рендер 30 элементами, чтобы DOM не зависал
  const limit = 30;
  const displayGroups = groups.slice(0, limit);
  
  if (groups.length > limit) {
      label.textContent = `Группы (показано ${limit} из ${groups.length})`;
  } else {
      label.textContent = `Все группы (${groups.length})`;
  }

  grid.innerHTML = '';
  displayGroups.forEach((g, i) => {
    const chip = document.createElement('button');
    chip.className = 'group-chip fade-up';
    chip.style.animationDelay = Math.min(i * 0.02, 0.3) + 's';
    chip.textContent = g;
    chip.onclick = () => openGroup(g);
    grid.appendChild(chip);
  });
}

// ─── OPEN GROUP ───
async function openGroup(group) {
  currentGroup = group;

  document.getElementById('searchScreen').style.display = 'none';
  document.getElementById('scheduleScreen').style.display = 'block';
  document.getElementById('backBtn').classList.add('visible');
  document.getElementById('heroName').textContent = group;
  document.getElementById('heroMeta').textContent = 'Загружаю расписание...';
  document.getElementById('headerTitle').textContent = group;
  document.getElementById('dayTabs').innerHTML = '';
  document.getElementById('lessonsContainer').innerHTML = `
    <div class="loader-wrap">
      <div class="spinner"></div>
      <div class="loader-text">Загружаю расписание...</div>
    </div>`;

  if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();

  try {
    const schedule = await fetchSchedule(group);
    currentSchedule = schedule;
    const days = Object.keys(schedule);

    if (!days.length) {
      document.getElementById('lessonsContainer').innerHTML = `
        <div class="error-card">
          <div class="error-icon">⚠️</div>
          <div class="error-text">Расписание для группы <b>${group}</b> не найдено или оно пустое.</div>
        </div>`;
      document.getElementById('heroMeta').textContent = 'Данные не найдены';
      return;
    }

    const totalLessons = Object.values(schedule).reduce((s, l) => s + l.length, 0);
    document.getElementById('heroMeta').textContent = `${days.length} дней · ${totalLessons} пар`;

    renderDayTabs(days);

    const todayIdx = getTodayIdx();
    const todayName = DAYS[todayIdx];
    const defaultDay = days.includes(todayName) ? todayName : days[0];
    showDay(defaultDay);

  } catch(e) {
    console.error(e);
    document.getElementById('lessonsContainer').innerHTML = `
      <div class="error-card">
        <div class="error-icon">⚠️</div>
        <div class="error-text">Ошибка загрузки. Попробуй ещё раз.</div>
      </div>`;
  }
}

// ─── RENDER DAY TABS ───
function renderDayTabs(days) {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = '';
  const todayIdx = getTodayIdx();
  const todayName = DAYS[todayIdx];

  days.forEach(day => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (day === todayName ? ' today' : '');
    btn.dataset.day = day;
    btn.textContent = DAYS_SHORT[DAYS.indexOf(day)] || day.slice(0,2);
    if (day === todayName) btn.textContent += ' ·';
    btn.onclick = () => {
      if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
      showDay(day);
    };
    tabs.appendChild(btn);
  });
}

// ─── SHOW DAY ───
function showDay(day) {
  currentDay = day;

  document.querySelectorAll('.day-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.day === day);
  });

  const lessons = currentSchedule[day] || [];
  const container = document.getElementById('lessonsContainer');
  container.innerHTML = '';

  if (!lessons.length) {
    container.innerHTML = `
      <div class="empty-day">
        <div class="empty-day-icon">🎉</div>
        <div class="empty-day-text">Занятий нет</div>
        <div class="empty-day-sub">Этот день свободен</div>
      </div>`;
    return;
  }

  const todayIdx = getTodayIdx();
  const isToday = DAYS[todayIdx] === day;

  lessons.forEach((lesson, i) => {
    const status = isToday ? getLessonStatus(lesson.time) : 'unknown';
    const countdown = isToday ? formatCountdown(lesson.time) : '';

    const card = document.createElement('div');
    card.className = 'lesson-card fade-up';
    card.style.animationDelay = (i * 0.05) + 's';
    if (status !== 'unknown') card.classList.add(status);

    let badgeHTML = '';
    if (status === 'ongoing' && countdown) {
      badgeHTML = `<div class="status-badge badge-ongoing">${countdown}</div>`;
    } else if (status === 'soon' && countdown) {
      badgeHTML = `<div class="status-badge badge-soon">${countdown}</div>`;
    }

    const timeParts = lesson.time.split('–');
    const timeStart = timeParts[0] || lesson.time;
    const timeEnd = timeParts[1] || '';

    card.innerHTML = `
      <div class="lesson-time-col">
        <div class="lesson-time-start">${timeStart}</div>
        <div class="lesson-time-end">${timeEnd}</div>
      </div>
      <div class="lesson-body">
        <div class="lesson-name">${lesson.name}</div>
        <div class="lesson-info">
          ${lesson.teacher !== '—' ? `<span class="lesson-tag">👤 ${lesson.teacher}</span>` : ''}
          ${lesson.room !== '—' ? `<span class="lesson-tag">🚪 ${lesson.room}</span>` : ''}
        </div>
      </div>
      ${badgeHTML}`;
    container.appendChild(card);
  });

  if (isToday) {
    setTimeout(() => {
      const ongoing = container.querySelector('.lesson-card.ongoing');
      const soon = container.querySelector('.lesson-card.soon');
      const target = ongoing || soon;
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 300);
  }
}

// ─── BACK ───
function goBack() {
  currentGroup = null;
  currentSchedule = {};

  document.getElementById('scheduleScreen').style.display = 'none';
  document.getElementById('searchScreen').style.display = 'block';
  document.getElementById('backBtn').classList.remove('visible');
  document.getElementById('headerTitle').textContent = 'СФУ Расписание';
  if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}

// ─── ПОИСК ───
document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) {
    renderGroups(allGroups);
    return;
  }
  const filtered = allGroups.filter(g => g.toLowerCase().includes(q));
  renderGroups(filtered);
});

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = e.target.value.trim();
    const filtered = allGroups.filter(g => g.toLowerCase().includes(q.toLowerCase()));
    if (filtered.length === 1) openGroup(filtered[0]);
    else if (q.length > 3) openGroup(q); 
  }
});

// ─── TOAST ───
function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── ТЕСТОВЫЕ ДАННЫЕ ───
function getTestGroups() {
  return ['ИСИТ-101','ИСИТ-102','КИ25-04б','ПИ-101','ПИ-201','ПМИ-101','ФИИТ-101','ИВТ-101','БИ-101'].sort();
}

// ─── ОБНОВЛЕНИЕ ТАЙМЕРОВ ───
setInterval(() => {
  if (!currentGroup || !currentDay) return;
  const todayIdx = getTodayIdx();
  if (DAYS[todayIdx] !== currentDay) return;

  document.querySelectorAll('.lesson-card').forEach((card, i) => {
    const lessons = currentSchedule[currentDay] || [];
    if (!lessons[i]) return;
    const status = getLessonStatus(lessons[i].time);
    card.classList.remove('ongoing','upcoming','soon','past','unknown');
    if (status !== 'unknown') card.classList.add(status);

    const badge = card.querySelector('.status-badge');
    const countdown = formatCountdown(lessons[i].time);

    if (status === 'ongoing' && countdown) {
      if (badge) { badge.textContent = countdown; badge.className = 'status-badge badge-ongoing'; }
      else {
        const b = document.createElement('div');
        b.className = 'status-badge badge-ongoing';
        b.textContent = countdown;
        card.appendChild(b);
      }
    } else if (status === 'soon' && countdown) {
      if (badge) { badge.textContent = countdown; badge.className = 'status-badge badge-soon'; }
    } else if (badge) {
      badge.remove();
    }
  });
}, 30000);

// ─── ЗАПУСК ───
init();
</script>
