<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>СФУ Расписание</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent:#2563EB; --accent2:#7C3AED;
  --as:rgba(37,99,235,.10); --ab:rgba(37,99,235,.22);
  --bg:#F0F2F5; --sf:#FFF; --sf2:#F4F6F9;
  --tx:#0F1117; --tx2:#5C6370; --tx3:#9BA3AF;
  --bd:rgba(0,0,0,.07);
  --gr:#16A34A; --gs:rgba(22,163,74,.10);
  --or:#D97706; --os:rgba(217,119,6,.10);
  --re:#DC2626; --rs:rgba(220,38,38,.10);
  --r:14px; --rs2:10px; --rp:100px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0D0F14;--sf:#161921;--sf2:#1E2230;
    --tx:#F0F2F5;--tx2:#8B95A6;--tx3:#4D5566;
    --bd:rgba(255,255,255,.07);
    --as:rgba(99,150,255,.12);--ab:rgba(99,150,255,.25);
    --gs:rgba(34,197,94,.10);--os:rgba(251,191,36,.10);--rs:rgba(248,113,113,.10);
  }
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--tx);overflow-x:hidden;min-height:100vh}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;background:var(--sf);border-bottom:1px solid var(--bd);padding:13px 16px;display:flex;align-items:center;gap:10px}
.hdr-ico{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.hdr-info{flex:1;min-width:0}
.hdr-t{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-s{font-size:11px;color:var(--tx3);margin-top:1px}
.hdr-back{display:none;align-items:center;gap:4px;background:var(--sf2);border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--accent);cursor:pointer;flex-shrink:0}
.hdr-back.on{display:flex}

/* SEARCH */
#pg-search{padding:14px 16px 24px}
.s-wrap{position:relative;margin-bottom:16px}
.s-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.4;pointer-events:none}
.s-inp{width:100%;padding:12px 14px 12px 38px;border:1.5px solid var(--bd);border-radius:var(--r);font-size:15px;font-family:inherit;background:var(--sf);color:var(--tx);outline:none;transition:border-color .2s,box-shadow .2s}
.s-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--as)}
.s-inp::placeholder{color:var(--tx3)}
.sec-lbl{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}

/* GROUPS GRID */
.g-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:20px}
.g-chip{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--rs2);padding:11px 6px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--tx);transition:all .15s;user-select:none}
.g-chip:active{transform:scale(.94);background:var(--as);border-color:var(--ab);color:var(--accent)}

/* LOADER */
.loader{display:flex;flex-direction:column;align-items:center;padding:48px 20px;gap:12px}
.spin{width:30px;height:30px;border:3px solid var(--bd);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{font-size:13px;color:var(--tx2)}

/* SCHEDULE */
#pg-sched{display:none;padding:14px 16px 32px}
.g-hero{background:var(--sf);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.g-av{width:42px;height:42px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:20px}
.g-nm{font-size:18px;font-weight:700;letter-spacing:-.3px}
.g-mt{font-size:12px;color:var(--tx2);margin-top:2px}

/* DAY TABS */
.d-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.d-tabs::-webkit-scrollbar{display:none}
.d-tab{flex-shrink:0;padding:7px 14px;border-radius:var(--rp);font-size:12px;font-weight:700;border:none;cursor:pointer;background:var(--sf);color:var(--tx2);transition:all .15s;white-space:nowrap}
.d-tab.today{color:var(--accent)}
.d-tab.active{background:var(--accent);color:#fff}
.d-tab.today.active{color:#fff}
.d-dot{display:inline-block;width:4px;height:4px;border-radius:50%;background:currentColor;margin-left:4px;vertical-align:middle}

/* LESSON CARDS */
.l-list{display:flex;flex-direction:column;gap:9px}
.l-card{background:var(--sf);border-radius:var(--r);padding:13px 14px 13px 18px;display:flex;gap:12px;align-items:flex-start;position:relative;overflow:hidden;transition:transform .12s}
.l-card:active{transform:scale(.98)}
.l-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3.5px;background:var(--accent);border-radius:3px 0 0 3px}
.l-card.ongoing::before{background:var(--gr)}
.l-card.soon::before{background:var(--or)}
.l-card.past{opacity:.5}
.l-card.past::before{background:var(--tx3)}

.l-tc{min-width:54px;flex-shrink:0;padding-top:1px}
.l-ts{font-size:14px;font-weight:700;line-height:1}
.l-te{font-size:11px;color:var(--tx3);margin-top:3px}
.l-pn{font-size:10px;color:var(--tx3);margin-top:4px}
.l-body{flex:1;min-width:0}
.l-name{font-size:14px;font-weight:600;line-height:1.35;margin-bottom:6px}
.l-tags{display:flex;flex-wrap:wrap;gap:5px}
.l-tag{font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;background:var(--sf2);color:var(--tx2);white-space:nowrap;max-width:170px;overflow:hidden;text-overflow:ellipsis}
.l-tag.tp{background:var(--as);color:var(--accent)}
.l-tag.wk{background:var(--os);color:var(--or)}
.l-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:var(--rp);white-space:nowrap;align-self:flex-start;flex-shrink:0;margin-top:1px}
.b-on{background:var(--gs);color:var(--gr)}
.b-sn{background:var(--os);color:var(--or)}

/* EMPTY / ERROR */
.empty{text-align:center;padding:44px 20px;color:var(--tx2)}
.empty-ico{font-size:42px;margin-bottom:12px}
.empty-t{font-size:15px;font-weight:600}
.empty-s{font-size:13px;color:var(--tx3);margin-top:4px}
.err{background:var(--rs);border:1px solid rgba(220,38,38,.2);border-radius:var(--r);padding:14px 16px;display:flex;gap:10px;align-items:flex-start;margin-bottom:14px}
.err p{font-size:13px;font-weight:500;color:var(--re)}

@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .22s ease forwards}

/* CONFIG BANNER */
.cfg-banner{background:var(--os);border:1px solid var(--or);border-radius:var(--r);padding:12px 14px;font-size:12px;color:var(--or);margin-bottom:14px;display:none}
.cfg-banner.show{display:block}
.cfg-banner b{font-weight:700}
</style>
</head>
<body>

<div class="hdr" id="hdr">
  <div class="hdr-ico">📚</div>
  <div class="hdr-info">
    <div class="hdr-t" id="hTitle">СФУ Расписание</div>
    <div class="hdr-s" id="hSub"></div>
  </div>
  <button class="hdr-back" id="backBtn" onclick="goBack()">← Назад</button>
</div>

<div id="pg-search">
  <div class="s-wrap">
    <span class="s-ico">🔍</span>
    <input class="s-inp" id="sInp" placeholder="Поиск группы: КИ, ПИ-20, ИСИТ…"
      autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="sec-lbl" id="gLbl">Группы</div>
  <div class="g-grid" id="gGrid">
    <div style="grid-column:1/-1"><div class="loader"><div class="spin"></div><p>Загружаю список…</p></div></div>
  </div>
</div>

<div id="pg-sched">
  <div class="g-hero">
    <div class="g-av">🎓</div>
    <div>
      <div class="g-nm" id="gNm">—</div>
      <div class="g-mt" id="gMt">—</div>
    </div>
  </div>
  <div class="d-tabs" id="dTabs"></div>
  <div class="l-list" id="lList"></div>
</div>

<script>
/* ─── КОНФИГУРАЦИЯ ─────────────────────────────────
   ВАЖНО: укажи IP/домен сервера где запущен bot.py
   Если запущено локально для тестов: http://localhost:8080
   Если на VPS: http://1.2.3.4:8080 или https://yourdomain.com

   Если оставить пустым — будет работать fallback через
   corsproxy.io (медленнее, не всегда доступен)
─────────────────────────────────────────────────── */
const API_BASE = "";  // ← ВСТАВЬ СЮДА URL публичного сервера, например: "https://yourdomain.com"
let detectedApiBase = "";

/* ─── TG INIT ─── */
const tg = window.Telegram.WebApp;
tg.expand(); tg.ready();
try {
  const tp = tg.themeParams || {};
  const s = document.documentElement.style;
  if(tp.bg_color)            s.setProperty('--bg', tp.bg_color);
  if(tp.secondary_bg_color)  s.setProperty('--sf', tp.secondary_bg_color);
  if(tp.text_color)          s.setProperty('--tx', tp.text_color);
  if(tp.hint_color)          s.setProperty('--tx2', tp.hint_color);
  if(tp.button_color)        s.setProperty('--accent', tp.button_color);
} catch(e){}

/* ─── КОНСТАНТЫ ─── */
const PAIR_TIMES = {
  1:['08:30','10:05'], 2:['10:15','11:50'], 3:['12:00','13:35'],
  4:['14:10','15:45'], 5:['15:55','17:30'], 6:['17:40','19:15'], 7:['19:25','21:00']
};
const DAYS_ORDER  = ['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
const DAYS_SHORT  = ['Пн','Вт','Ср','Чт','Пт','Сб'];
const DAYS_BY_IDX = {1:'Понедельник',2:'Вторник',3:'Среда',4:'Четверг',5:'Пятница',6:'Суббота'};

/* ─── СОСТОЯНИЕ ─── */
let allGroups = [];
let schedule  = {};
let curGroup  = null;
let curDay    = null;
let timerID   = null;

/* ─── API ЗАПРОСЫ ─────────────────────────────────
   Три уровня fallback:
   1. Свой сервер (bot.py) — если задан API_BASE
   2. corsproxy.io → edu.sfu-kras.ru/api/...
   3. corsproxy.io → HTML страница (парсинг в браузере)
─────────────────────────────────────────────────── */
async function apiFetch(path) {
  const errors = [];

  // 1. Свой сервер
  const ownBase = await getApiBase();
  if(ownBase) {
    try {
      const r = await fetch(ownBase + path, {signal: AbortSignal.timeout(8000)});
      if(r.ok) return await r.json();
    } catch(e) { errors.push('own:' + e.message); }
  }

  // 2. CORS-прокси → JSON API СФУ
  const sfuPath = path.replace('/api/groups', '/api/timetable/groups')
                      .replace('/api/schedule', '/api/timetable/lessons');
  const sfuUrl = 'https://edu.sfu-kras.ru' + sfuPath;

  for(const proxy of [
    'https://corsproxy.io/?',
    'https://api.allorigins.win/raw?url=',
  ]) {
    try {
      const r = await fetch(proxy + encodeURIComponent(sfuUrl), {signal: AbortSignal.timeout(10000)});
      if(r.ok) {
        const text = await r.text();
        try { return JSON.parse(text); } catch(e) { errors.push('json_parse:'+e); }
      }
    } catch(e) { errors.push('proxy:' + e.message); }
  }

  // 3. HTML fallback для списка групп
  if(path.startsWith('/api/groups')) {
    const q = new URLSearchParams(path.split('?')[1] || '').get('q') || '';
    const groups = await fetchHtmlGroups(q);
    if(groups.length) return groups;
  }

  console.warn('apiFetch errors for', path, errors);
  return null;
}

function canProbeLocalApi() {
  return location.protocol === 'file:' ||
         location.hostname === 'localhost' ||
         location.hostname === '127.0.0.1';
}

async function getApiBase() {
  if(API_BASE) return API_BASE.replace(/\/$/, '');
  if(detectedApiBase) return detectedApiBase;
  if(!canProbeLocalApi()) return '';

  const hosts = ['localhost', '127.0.0.1'];
  const ports = [8080,8081,8082,8083,8084,8085,8086,8087,8088,8089,8090];
  for(const host of hosts) {
    for(const port of ports) {
      const base = `http://${host}:${port}`;
      if(await probeApiBase(base)) {
        detectedApiBase = base;
        console.info('Local API detected:', detectedApiBase);
        return detectedApiBase;
      }
    }
  }
  return '';
}

async function probeApiBase(base) {
  try {
    const r = await fetch(`${base}/api/health`, {
      cache: 'no-store',
      signal: AbortSignal.timeout(1200)
    });
    if(r.ok) {
      const data = await r.json().catch(() => null);
      if(data && data.ok === true) return true;
    }
  } catch(e) {}
  return false;
}

async function fetchHtmlGroups(query='') {
  const url = 'https://edu.sfu-kras.ru/timetable';
  for(const proxy of [
    'https://corsproxy.io/?',
    'https://api.allorigins.win/raw?url=',
  ]) {
    try {
      const r = await fetch(proxy + encodeURIComponent(url), {signal: AbortSignal.timeout(12000)});
      if(r.ok) return parseHTMLGroups(await r.text(), query);
    } catch(e) { continue; }
  }
  return [];
}

async function fetchHtmlSchedule(group) {
  const url = `https://edu.sfu-kras.ru/timetable?group=${encodeURIComponent(group)}`;
  for(const proxy of [
    'https://corsproxy.io/?',
    'https://api.allorigins.win/raw?url=',
  ]) {
    try {
      const r = await fetch(proxy + encodeURIComponent(url), {signal: AbortSignal.timeout(12000)});
      if(r.ok) {
        const html = await r.text();
        return parseHTMLSchedule(html);
      }
    } catch(e) { continue; }
  }
  return null;
}

/* ─── HTML ПАРСИНГ (клиентский fallback) ─── */
function cleanText(s) {
  return (s || '').replace(/\u00a0/g, ' ').replace(/\s+/g, ' ').trim();
}

function parseHTMLGroups(html, query='') {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const q = normalizeGroupQuery(query);
  const groups = [...doc.querySelectorAll('a[href^="?group="]')]
    .map(a => cleanText(a.textContent))
    .filter(Boolean)
    .filter(g => !q || normalizeGroupQuery(g).includes(q));
  return [...new Set(groups)].sort((a,b) => a.localeCompare(b, 'ru'));
}

function normalizeGroupQuery(s) {
  return cleanText(s).toLowerCase().replaceAll('ё','е');
}

function toGroupNames(data) {
  return Array.isArray(data)
    ? data.map(x => typeof x === 'string' ? x : x.name || '').map(cleanText).filter(Boolean)
    : [];
}

function mergeGroups(list) {
  let changed = false;
  list.forEach(g => {
    if(g && !allGroups.includes(g)) {
      allGroups.push(g);
      changed = true;
    }
  });
  if(changed) allGroups.sort((a,b) => a.localeCompare(b, 'ru'));
}

function filterGroups(query) {
  const q = normalizeGroupQuery(query);
  return allGroups.filter(g => normalizeGroupQuery(g).includes(q));
}

function parseHTMLSchedule(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const lessons = [];

  const tables = doc.querySelectorAll('table.timetable');
  tables.forEach(table => {
    let currentDay = null;
    const rows = table.querySelectorAll(':scope > tbody > tr, :scope > tr');
    rows.forEach(row => {
      if(row.classList.contains('heading-section')) {
        const txt = cleanText(row.textContent);
        currentDay = DAYS_ORDER.find(d => txt.includes(d)) || null;
        return;
      }
      if(!currentDay || row.classList.contains('heading')) return;

      const tds = [...row.children].filter(el => el.tagName === 'TD');
      if(tds.length < 3) return;

      const pair = parseInt(cleanText(tds[0].textContent), 10) || 0;
      const timeStr = normalizeTime(cleanText(tds[1].textContent));
      const lessonCells = tds.slice(2);

      if(lessonCells.length === 1) {
        const lesson = extractLesson(lessonCells[0], currentDay, pair, timeStr, 'обе');
        if(lesson) lessons.push(lesson);
        return;
      }

      lessonCells.slice(0,2).forEach((cell, i) => {
        const week = cell.getAttribute('colspan') === '2' ? 'обе' : (i === 0 ? 'нечетная' : 'четная');
        const lesson = extractLesson(cell, currentDay, pair, timeStr, week);
        if(lesson) lessons.push(lesson);
      });
    });
  });

  return lessons.length ? dedupeLessons(lessons) : null;
}

function normalizeTime(s) {
  const m = cleanText(s).replaceAll('.', ':').match(/(\d{1,2}:\d{2})\s*[-–]\s*(\d{1,2}:\d{2})/);
  return m ? `${m[1].padStart(5,'0')}–${m[2].padStart(5,'0')}` : '—';
}

function extractLesson(cell, day, pair, timeStr, week) {
  const text = cleanText(cell.textContent);
  if(!text || text === '—' || /выходной день/i.test(text)) return null;

  const b = cell.querySelector('b,strong');
  let subject = b ? cleanText(b.textContent) : '';
  if(!subject) subject = cleanText((cell.textContent || '').split('\n')[0]).replace(/\s*\([^)]*\)\s*$/, '');
  if(!subject) return null;

  const typeMatch = text.match(/\(([^)]*(?:лек|пр\.?|лаб|сем|занятие)[^)]*)\)/i);
  let ltype = typeMatch ? cleanText(typeMatch[1]) : '';

  const teacherEl = cell.querySelector('em a, em, a');
  const teacher = teacherEl ? cleanText(teacherEl.textContent) || '—' : '—';

  let room = '—';
  let format = '';
  const lines = (cell.innerText || cell.textContent || '').split('\n').map(cleanText).filter(Boolean);
  for(const line of lines) {
    const low = line.toLowerCase().replaceAll('ё','е');
    if(line === subject || line === teacher || /^\([^)]*\)$/.test(line)) continue;
    if(low.includes('синхронно') || low.includes('асинхронно')) { format = line; continue; }
    if(low.includes('ауд') || low.includes('корпус') || low.includes('online') || low.includes('эиос') || low.includes('http')) room = line;
  }
  ltype = [ltype, format].filter(Boolean).join(' · ');

  return {day,pair,time:timeStr,subject,teacher,room,type:ltype,week};
}

function dedupeLessons(lessons) {
  const seen = new Set();
  return lessons.filter(l => {
    const key = [l.day,l.pair,l.time,l.subject,l.teacher,l.room,l.type,l.week].join('|');
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

/* ─── ЗАГРУЗКА ГРУПП ─── */
async function loadGroups() {
  // Сразу кладём актуальные группы в локальный список, чтобы поиск по "КИ" работал без ожидания сети
  const defaults = getDefaultGroups();
  mergeGroups(defaults);
  renderGroups(defaults.slice(0,40));

  try {
    const data = await apiFetch('/api/groups?q=');  // пробуем получить все группы
    mergeGroups(toGroupNames(data));
  } catch(e) {}

  if(!allGroups.length) {
    // Пробуем поиск по известным префиксам
    const prefixes = ['КИ','ПИ','ПМИ','ИСИТ','ИВТ','БИ','ПМ','ФИ','МО'];
    for(const p of prefixes) {
      try {
        const data = await apiFetch(`/api/groups?q=${encodeURIComponent(p)}`);
        mergeGroups(toGroupNames(data));
      } catch(e) {}
    }
  }

  if(allGroups.length > 0) {
    renderGroups(allGroups.slice(0,40));
  }
  // иначе оставляем дефолтные
}

/* ─── ЗАГРУЗКА РАСПИСАНИЯ ─── */
async function loadSchedule(group) {
  // Метод 1: JSON API
  const data = await apiFetch(`/api/schedule?group=${encodeURIComponent(group)}`);
  if(Array.isArray(data) && data.length) return normalizeJsonLessons(data);

  // Метод 2: HTML-парсинг
  const htmlLessons = await fetchHtmlSchedule(group);
  if(htmlLessons && htmlLessons.length) return htmlLessons;

  return [];
}

function normalizeJsonLessons(raw) {
  return raw.map(item => {
    const dayIdx  = item.day || item.weekday;
    const dayName = DAYS_BY_IDX[dayIdx] || item.day_name || '';
    if(!dayName) return null;

    const pair = +(item.pair || item.number || item.lesson || 0);
    const times = PAIR_TIMES[pair] || ['',''];
    const timeStr = times[0] ? `${times[0]}–${times[1]}` : (item.time || '—');

    let week = item.week || 'обе';
    if(typeof week==='number') week = week===1?'нечетная':'четная';
    if(!['нечетная','четная'].includes(week)) week='обе';

    return {
      day:     dayName,
      pair,
      time:    timeStr,
      subject: (item.subject||item.name||item.discipline||'—').trim(),
      teacher: (item.teacher||item.lecturer||'—').trim(),
      room:    (item.place||item.room||item.auditory||'—').trim(),
      type:    (item.type||item.kind||'').trim(),
      week,
    };
  }).filter(Boolean);
}

/* ─── УТИЛИТЫ ВРЕМЕНИ ─── */
function nowMin(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function parseMin(s){ const m=s&&s.match(/(\d{1,2}):(\d{2})/); return m?+m[1]*60+ +m[2]:null; }
function todayName(){ const d=new Date().getDay(); return DAYS_BY_IDX[d===0?7:d]||null; }

function lessonStatus(lesson) {
  const now=nowMin(), [ts,te]=(lesson.time||'').split('–');
  const s=parseMin(ts), e=parseMin(te);
  if(s===null||e===null) return 'unknown';
  if(now>=s&&now<=e)  return 'ongoing';
  if(now<s) return (s-now<=15)?'soon':'upcoming';
  return 'past';
}

function lessonCountdown(lesson) {
  const now=nowMin(), [ts,te]=(lesson.time||'').split('–');
  const s=parseMin(ts), e=parseMin(te);
  if(s===null||e===null) return '';
  if(now>=s&&now<=e){ const l=e-now; return l<1?'Заканчивается':`Ещё ${l<60?l+'мин':Math.floor(l/60)+'ч '+l%60+'мин'}`; }
  if(now<s&&s-now<=15) return `Через ${s-now}мин`;
  return '';
}

/* ─── RENDER ─── */
function renderGroups(list) {
  const grid=document.getElementById('gGrid');
  const lbl =document.getElementById('gLbl');
  lbl.textContent = allGroups.length ? `Все группы (${allGroups.length})` : 'Популярные группы';

  if(!list.length) {
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--tx3)">Ничего не найдено</div>';
    return;
  }
  grid.innerHTML='';
  list.forEach((g,i)=>{
    const btn=document.createElement('button');
    btn.className='g-chip fu';
    btn.style.animationDelay=Math.min(i*.025,.5)+'s';
    btn.textContent=g;
    btn.onclick=()=>openGroup(g);
    grid.appendChild(btn);
  });
}

async function openGroup(group) {
  curGroup=group;
  haptic('selection');
  document.getElementById('pg-search').style.display='none';
  document.getElementById('pg-sched').style.display='block';
  document.getElementById('backBtn').classList.add('on');
  document.getElementById('hTitle').textContent=group;
  document.getElementById('gNm').textContent=group;
  document.getElementById('gMt').textContent='Загружаю…';
  document.getElementById('dTabs').innerHTML='';
  document.getElementById('lList').innerHTML='<div class="loader"><div class="spin"></div><p>Загружаю расписание…</p></div>';

  try {
    const lessons = await loadSchedule(group);
    const byDay={};
    (lessons||[]).forEach(l=>{ (byDay[l.day]=byDay[l.day]||[]).push(l); });
    const days=DAYS_ORDER.filter(d=>byDay[d]);

    if(!days.length) {
      document.getElementById('gMt').textContent='Данные не найдены';
      document.getElementById('lList').innerHTML=`<div class="err"><span style="font-size:20px">⚠️</span><p>Расписание для группы <b>${group}</b> не найдено.<br>Проверь правильность названия.</p></div>`;
      return;
    }

    schedule=byDay;
    const total=days.reduce((s,d)=>s+schedule[d].length,0);
    document.getElementById('gMt').textContent=`${days.length} дней · ${total} пар`;
    buildTabs(days);

    const today=todayName();
    showDay(days.includes(today)?today:days[0]);

    clearInterval(timerID);
    timerID=setInterval(()=>{ if(curDay&&schedule[curDay]) refreshBadges(); },30000);

  } catch(e) {
    console.error(e);
    document.getElementById('gMt').textContent='Ошибка';
    document.getElementById('lList').innerHTML=`<div class="err"><span style="font-size:20px">⚠️</span><p>Не удалось загрузить расписание. Попробуй ещё раз.</p></div>`;
  }
}

function buildTabs(days) {
  const tabs=document.getElementById('dTabs');
  const today=todayName();
  tabs.innerHTML='';
  days.forEach(d=>{
    const i=DAYS_ORDER.indexOf(d);
    const btn=document.createElement('button');
    btn.className='d-tab'+(d===today?' today':'');
    btn.dataset.day=d;
    btn.innerHTML=`${DAYS_SHORT[i]||d.slice(0,2)}${d===today?'<span class="d-dot"></span>':''}`;
    btn.onclick=()=>{ haptic('selection'); showDay(d); };
    tabs.appendChild(btn);
  });
}

function showDay(day) {
  curDay=day;
  const today=todayName(), isToday=(day===today);
  document.querySelectorAll('.d-tab').forEach(t=>t.classList.toggle('active',t.dataset.day===day));
  const lessons=schedule[day]||[];
  const list=document.getElementById('lList');
  list.innerHTML='';

  if(!lessons.length) {
    list.innerHTML=`<div class="empty"><div class="empty-ico">🎉</div><div class="empty-t">Занятий нет</div><div class="empty-s">Этот день свободен</div></div>`;
    return;
  }

  const sorted=[...lessons].sort((a,b)=>a.pair-b.pair);
  sorted.forEach((ls,i)=>{
    const st=isToday?lessonStatus(ls):'unknown';
    const cd=isToday?lessonCountdown(ls):'';
    const [ts,te]=(ls.time||'').split('–');

    const card=document.createElement('div');
    card.className=`l-card fu${st!=='unknown'?' '+st:''}`;
    card.style.animationDelay=(i*.05)+'s';

    let badge='';
    if(st==='ongoing'&&cd)      badge=`<div class="l-badge b-on">${cd}</div>`;
    else if(st==='soon'&&cd)    badge=`<div class="l-badge b-sn">${cd}</div>`;

    let tags='';
    if(ls.teacher!=='—') tags+=`<span class="l-tag">👤 ${ls.teacher}</span>`;
    if(ls.room!=='—')    tags+=`<span class="l-tag">🚪 ${ls.room}</span>`;
    if(ls.type)          tags+=`<span class="l-tag tp">${ls.type}</span>`;
    if(ls.week!=='обе')  tags+=`<span class="l-tag wk">${ls.week==='нечетная'?'нечёт.':'чётн.'}</span>`;

    card.innerHTML=`
      <div class="l-tc">
        <div class="l-ts">${ts||'—'}</div>
        <div class="l-te">${te||''}</div>
        <div class="l-pn">${ls.pair?ls.pair+' пара':''}</div>
      </div>
      <div class="l-body">
        <div class="l-name">${ls.subject}</div>
        <div class="l-tags">${tags}</div>
      </div>
      ${badge}`;
    list.appendChild(card);
  });

  if(isToday) {
    setTimeout(()=>{
      const el=list.querySelector('.l-card.ongoing')||list.querySelector('.l-card.soon');
      if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
    },300);
  }
}

function refreshBadges() {
  if(!curDay||todayName()!==curDay) return;
  const lessons=[...(schedule[curDay]||[])].sort((a,b)=>a.pair-b.pair);
  document.querySelectorAll('.l-card').forEach((card,i)=>{
    if(!lessons[i]) return;
    const st=lessonStatus(lessons[i]);
    const cd=lessonCountdown(lessons[i]);
    card.classList.remove('ongoing','soon','upcoming','past','unknown');
    if(st!=='unknown') card.classList.add(st);
    let badge=card.querySelector('.l-badge');
    if((st==='ongoing'||st==='soon')&&cd){
      if(!badge){ badge=document.createElement('div'); card.appendChild(badge); }
      badge.className=`l-badge ${st==='ongoing'?'b-on':'b-sn'}`;
      badge.textContent=cd;
    } else if(badge) badge.remove();
  });
}

function goBack() {
  clearInterval(timerID);
  curGroup=null; schedule={}; curDay=null;
  document.getElementById('pg-sched').style.display='none';
  document.getElementById('pg-search').style.display='block';
  document.getElementById('backBtn').classList.remove('on');
  document.getElementById('hTitle').textContent='СФУ Расписание';
  haptic('light');
}

/* ─── ПОИСК ─── */
let searchTimer=null;
let searchSeq=0;
document.getElementById('sInp').addEventListener('input',e=>{
  clearTimeout(searchTimer);
  const raw=e.target.value.trim();
  const q=normalizeGroupQuery(raw);
  if(!q){ renderGroups((allGroups.length?allGroups:getDefaultGroups()).slice(0,40)); return; }
  searchTimer=setTimeout(async()=>{
    const seq=++searchSeq;
    let filtered=filterGroups(raw);
    document.getElementById('gLbl').textContent=`Результаты (${filtered.length})`;
    renderGroups(filtered.slice(0,40));

    if(q.length>=2) {
      document.getElementById('gLbl').textContent=`Ищу «${raw}»…`;
      try {
        const data=await apiFetch(`/api/groups?q=${encodeURIComponent(raw)}`);
        if(seq!==searchSeq) return;
        mergeGroups(toGroupNames(data));
        filtered=filterGroups(raw);
        if(!filtered.length) {
          filtered=toGroupNames(data);
        }
      } catch(e){}
    }

    if(seq!==searchSeq) return;
    document.getElementById('gLbl').textContent=`Результаты (${filtered.length})`;
    renderGroups(filtered.slice(0,40));
  },200);
});

document.getElementById('sInp').addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  const q=e.target.value.trim();
  const f=filterGroups(q);
  if(f.length===1) openGroup(f[0]);
});
